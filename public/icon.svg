<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000040"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book group with shadow -->
  <g transform="translate(256,260)" filter="url(#shadow)">
    <!-- Book cover back (dark brown) -->
    <path d="M-2,-95 C-2,-95 -140,-118 -165,-92 L-165,92 C-140,66 -2,95 -2,95" fill="#5c3a1e" stroke="#3d2510" stroke-width="2"/>
    <path d="M2,-95 C2,-95 140,-118 165,-92 L165,92 C140,66 2,95 2,95" fill="#5c3a1e" stroke="#3d2510" stroke-width="2"/>
    <!-- Left page (slightly cream) -->
    <path d="M-8,-85 C-8,-85 -130,-105 -155,-82 L-155,82 C-130,58 -8,82 -8,82 Z" fill="#fefcf7"/>
    <!-- Right page -->
    <path d="M8,-85 C8,-85 130,-105 155,-82 L155,82 C130,58 8,82 8,82 Z" fill="#f9f6f0"/>
    <!-- Page fold shadow left -->
    <path d="M-8,-85 L-8,82" stroke="#e8e0d4" stroke-width="1.5"/>
    <!-- Page fold shadow right -->
    <path d="M8,-85 L8,82" stroke="#e8e0d4" stroke-width="1.5"/>
    <!-- Spine center line -->
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#3d2510" stroke-width="3"/>
    <!-- Spine highlight -->
    <line x1="-1" y1="-88" x2="-1" y2="88" stroke="#7a5231" stroke-width="1" opacity="0.5"/>
    <line x1="1" y1="-88" x2="1" y2="88" stroke="#7a5231" stroke-width="1" opacity="0.5"/>
    <!-- Text lines left -->
    <line x1="-125" y1="-45" x2="-30" y2="-45" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-125" y1="-22" x2="-45" y2="-22" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-125" y1="1" x2="-50" y2="1" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-125" y1="24" x2="-60" y2="24" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Text lines right -->
    <line x1="30" y1="-45" x2="125" y2="-45" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="45" y1="-22" x2="125" y2="-22" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="50" y1="1" x2="125" y2="1" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="60" y1="24" x2="125" y2="24" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
  </g>
  <!-- Sparkle/star top right -->
  <g transform="translate(385,120)" fill="white" opacity="0.85">
    <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5 Z"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(355,165)" fill="white" opacity="0.5">
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
  </g>
  <!-- Tiny sparkle -->
  <g transform="translate(140,155)" fill="white" opacity="0.4">
    <path d="M0,-7 L2,-2 L7,0 L2,2 L0,7 L-2,2 L-7,0 L-2,-2 Z"/>
  </g>
</svg>
